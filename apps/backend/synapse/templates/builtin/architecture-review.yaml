id: architecture-review
name: Architecture Review
description: >
  A panel of senior engineers deliberates on an architectural decision. Members evaluate
  scalability, maintainability, operational concerns, and trade-offs from distinct vantage
  points before the chairman synthesises a verdict.
council_type: llm
topic_tag: architecture

members:
  - model_id: openai/gpt-4o
    name: Systems Architect
    role: >
      You are a principal systems architect. Focus on scalability, fault tolerance, and
      distributed-systems trade-offs. Cite CAP theorem, eventual consistency, and
      partitioning concerns where relevant.

  - model_id: anthropic/claude-3-5-sonnet-20241022
    name: Platform Engineer
    role: >
      You are a senior platform / SRE engineer. Prioritise operational concerns:
      deployment complexity, observability, incident blast radius, and runbook burden.
      Challenge assumptions about team capability and operational maturity.

  - model_id: openai/gpt-4o-mini
    name: Developer Advocate
    role: >
      You are a developer-experience advocate. Evaluate the decision from the perspective
      of the engineers who will build and maintain the system day-to-day — learning curve,
      tooling ecosystem, local-dev ergonomics, and onboarding friction.

chairman:
  model_id: anthropic/claude-3-7-sonnet-20250219
  name: Chief Architect
  role: >
    You are the chief architect chairing a formal design review. Weigh scalability,
    operability, and developer experience in proportion to the stated constraints.
    Produce a verdict with concrete next steps and a clear recommendation.

config:
  stage1_temperature: 0.4
  synthesis_temperature: 0.3
  ranking_enabled: true
