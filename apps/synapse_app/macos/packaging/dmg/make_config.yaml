# flutter_distributor — macOS .dmg make_config.
#
# Schema: packages/flutter_app_packager/lib/src/makers/dmg/make_dmg_config.dart
#
# Required: title, contents (the appdmg layout — list of items with
# {x, y, type, path}). Optional: icon, background, window size, etc.
#
# The standard "drag-to-install" UX puts the .app on the left side of
# the mounted DMG window and a shortcut to /Applications on the right.
# Users drag the app onto the shortcut to install. This is what we
# configure below.

title: Synapse

contents:
  # The .app bundle (drag source).
  #
  # Path is resolved relative to appdmg's working directory, which is
  # the per-build staging dir flutter_distributor creates at:
  #   dist/<version>/<job>-macos_dmg/
  #
  # flutter_distributor pre-stages by copying:
  #   build/macos/Build/Products/Release/synapse_app.app  →  <staging>/synapse_app.app
  #
  # So `path:` is just the basename, NOT the original Flutter build path.
  # The first failed config was `build/macos/Build/Products/Release/synapse_app.app`
  # which appdmg joined onto the staging dir and couldn't find.
  - x: 110
    y: 150
    type: file
    path: synapse_app.app

  # /Applications shortcut (drag target). type=link tells appdmg to
  # create a symlink in the DMG.
  - x: 380
    y: 150
    type: link
    path: /Applications
