name: synapse_app
description: "Synapse — multi-agent deliberation system Flutter app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  # Riverpod for dependency injection + state management. Replaces the
  # legacy `provider` package, which was a dev-time dep but unused.
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  go_router: ^14.0.0
  # F3 — local push notification display
  flutter_local_notifications: ^17.2.2
  # F3 Phase 2 — FCM/APNs native push (background + killed-app delivery)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  # F3 — random ntfy topic generation
  uuid: ^4.0.0
  # OIDC login via Casdoor (Cerebro jwt_oidc mode)
  casdoor_flutter_sdk: ^1.1.0
  # Desktop window control — initial size, maximize, close-to-tray
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
