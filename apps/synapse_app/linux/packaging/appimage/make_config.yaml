# flutter_distributor — AppImage make_config.
#
# Schema: packages/flutter_app_packager/lib/src/makers/appimage/make_appimage_config.dart
#
# IMPORTANT — `icon:` is resolved literally as File(<value>) at runtime,
# relative to whichever directory flutter_distributor was invoked from
# (i.e. apps/synapse_app/). It is NOT relative to this make_config.yaml.
# Hence the path below starts at the project-root-relative location.
#
# IMPORTANT — flutter_distributor auto-generates the .desktop entry from
# the fields below (display_name → Name, categories → Categories, etc.).
# Don't hand-write a .desktop file; it'll be ignored.

display_name: Synapse
generic_name: Multi-agent deliberation
icon: linux/packaging/appimage/synapse.png

startup_notify: true

categories:
  - Office
  - Productivity

keywords:
  - AI
  - agents
  - deliberation
  - council
  - memory
