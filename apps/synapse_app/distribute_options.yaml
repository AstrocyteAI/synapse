# flutter_distributor configuration — Synapse desktop release pipeline.
#
# https://github.com/leanflutter/flutter_distributor
#
# Schema reference: packages/unified_distributor/lib/src/release_job.dart
# (the README on the GitHub repo lags behind the actual source — what
# matters is the ReleaseJob.fromJson code which expects the nested
# `package: { platform:, target: }` shape used here, NOT the older flat
# `package_platform:` / `package_target:` shape some examples still show).
#
# All three desktop targets ship via flutter_distributor:
#   • Linux   → AppImage (bundles GTK + webkit2gtk; runs on any distro)
#   • macOS   → .dmg     (drag-to-Applications)
#   • Windows → .exe     (NSIS installer with Start menu + uninstaller)
#
# Local build (one job at a time):
#   dart pub global activate flutter_distributor
#   flutter_distributor release --name=production --jobs=release-linux-appimage
#   flutter_distributor release --name=production --jobs=release-macos-dmg
#   flutter_distributor release --name=production --jobs=release-windows-exe
#
# Outputs land at: dist/<version>/<job-name>/

output: dist/

releases:
  - name: production
    jobs:
      # -----------------------------------------------------------------
      # Linux — AppImage (single-file binary, bundles system deps)
      # -----------------------------------------------------------------
      - name: release-linux-appimage
        package:
          platform: linux
          target: appimage

      # -----------------------------------------------------------------
      # macOS — .dmg (drag-to-Applications style)
      # -----------------------------------------------------------------
      # Notes:
      #   • Without an Apple Developer ID + notarization, end users will
      #     see "App can't be opened — Apple cannot verify it." Workaround:
      #     System Settings → Privacy & Security → "Open Anyway."
      #   • Real fix is code-signing in CI; defer until public distribution
      #     warrants the cost ($99/yr Apple Developer Program).
      - name: release-macos-dmg
        package:
          platform: macos
          target: dmg

      # -----------------------------------------------------------------
      # Windows — NSIS installer (.exe)
      # -----------------------------------------------------------------
      # Notes:
      #   • Without a code-signing cert, the installer triggers Windows
      #     SmartScreen ("Unrecognized publisher"). Users click "More info"
      #     → "Run anyway."
      #   • Real fix is OV/EV code-signing certificate (~$300/yr+).
      #     Defer until public distribution.
      - name: release-windows-exe
        package:
          platform: windows
          target: exe
