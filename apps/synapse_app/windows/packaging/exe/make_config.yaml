# flutter_distributor — Windows installer make_config.
#
# Schema: packages/flutter_app_packager/lib/src/makers/exe/make_exe_config.dart
#
# IMPORTANT: despite the package_target being "exe", flutter_app_packager's
# EXE maker actually wraps Inno Setup (not NSIS — the README's "NSIS"
# reference is stale). The Windows runner needs Inno Setup installed via
# `choco install -y innosetup` (the workflow currently installs `nsis`
# which won't be found by the maker — fix that next).
#
# Required: app_id (must be stable across versions; changing it breaks
# the Add/Remove Programs upgrade path). Conventionally a UUID in braces.
# Generate once, never change. The value below was generated with `uuidgen`
# on 2026-05-03 and is dedicated to Synapse desktop.

app_id: "{2D2A18AA-4D5E-4841-B2C6-CD2CA4039FA7}"

display_name: Synapse
publisher_name: Odeon Consulting Group
publisher_url: https://odeoncg.ai

# Optional: where Synapse installs by default. Inno Setup interprets
# {autopf64} as %ProgramFiles% on 64-bit systems.
install_dir_name: Synapse

# Optional: create a desktop shortcut at install time (default false).
create_desktop_icon: true
