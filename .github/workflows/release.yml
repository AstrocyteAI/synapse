name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ---------------------------------------------------------------------------
  # Docker images — Synapse's own backend + web (parallel matrix).
  #
  # Synapse publishes only its own images. Astrocyte images
  # (astrocyte-gateway-py, astrocyte-postgres) ship from the
  # AstrocyteAI/astrocyte repo's release workflow and are pulled at
  # runtime by Synapse's docker-compose.yml.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: synapse-backend
            context: apps/backend
            image: ghcr.io/astrocyteai/synapse/synapse-backend
          - name: synapse-web
            context: apps/web
            image: ghcr.io/astrocyteai/synapse/synapse-web

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # Flutter desktop builds — macOS, Windows, Linux (parallel matrix)
  # ---------------------------------------------------------------------------
  flutter:
    name: Flutter (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            build-cmd: flutter build macos --release
            artifact-path: apps/synapse_app/build/macos/Build/Products/Release/synapse_app.app
            asset-name: synapse-macos
            archive-cmd: zip -r

          - os: windows-latest
            target: windows
            build-cmd: flutter build windows --release
            artifact-path: apps/synapse_app/build/windows/x64/runner/Release
            asset-name: synapse-windows
            archive-cmd: Compress-Archive -Path

          - os: ubuntu-latest
            target: linux
            build-cmd: flutter build linux --release
            artifact-path: apps/synapse_app/build/linux/x64/release/bundle
            asset-name: synapse-linux
            archive-cmd: tar -czf

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.6"
          channel: stable
          cache: true

      - name: Platform setup (Linux)
        if: matrix.os == 'ubuntu-latest'
        # libwebkit2gtk-4.1-dev is required by the desktop_webview_window
        # plugin's CMake configure; without it, FindPkgConfig fails the
        # build step.
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libwebkit2gtk-4.1-dev

      - name: Install dependencies
        working-directory: apps/synapse_app
        run: flutter pub get

      - name: Enable desktop target
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Build (macOS / Windows)
        # Linux skips this step — flutter_distributor builds + packages
        # in one go to produce the AppImage. Calling flutter build first
        # would duplicate work.
        if: matrix.os != 'ubuntu-latest'
        working-directory: apps/synapse_app
        run: ${{ matrix.build-cmd }}

      # ---------------------------------------------------------------------
      # Linux — AppImage via flutter_distributor (single-file binary that
      # bundles GTK, webkit2gtk, glib, etc. so end users don't need any
      # apt install before running). See apps/synapse_app/distribute_options.yaml.
      # ---------------------------------------------------------------------
      - name: Install AppImage tooling
        if: matrix.os == 'ubuntu-latest'
        run: |
          # libfuse2 is needed at runtime by AppImage to mount the bundle;
          # desktop-file-utils provides validate-desktop-file used by
          # appimagetool to sanity-check the .desktop entry.
          sudo apt-get install -y --no-install-recommends \
            libfuse2 desktop-file-utils
          dart pub global activate flutter_distributor

      - name: Build AppImage
        if: matrix.os == 'ubuntu-latest'
        working-directory: apps/synapse_app
        run: |
          flutter_distributor release \
            --name=production \
            --jobs=release-linux-appimage

      - name: Locate AppImage and stage for release
        if: matrix.os == 'ubuntu-latest'
        working-directory: apps/synapse_app
        run: |
          set -euo pipefail
          TAG=${{ github.ref_name }}
          # flutter_distributor drops outputs under dist/<version>/<name>/
          APPIMAGE=$(find dist -name '*.AppImage' -type f | head -1)
          if [ -z "${APPIMAGE}" ]; then
            echo "::error::No .AppImage produced — check flutter_distributor output above"
            ls -la dist/ || true
            exit 1
          fi
          mv "${APPIMAGE}" "synapse-linux-${TAG}.AppImage"
          chmod +x "synapse-linux-${TAG}.AppImage"
          echo "ASSET=apps/synapse_app/synapse-linux-${TAG}.AppImage" >> $GITHUB_ENV

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          TAG=${{ github.ref_name }}
          NAME="${{ matrix.asset-name }}-${TAG}"
          zip -r "${NAME}.zip" "${{ matrix.artifact-path }}"
          echo "ASSET=${NAME}.zip" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $name = "${{ matrix.asset-name }}-${tag}"
          Compress-Archive -Path "${{ matrix.artifact-path }}\*" -DestinationPath "${name}.zip"
          echo "ASSET=${name}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
