name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ---------------------------------------------------------------------------
  # Docker images — Synapse's own backend + web (parallel matrix).
  #
  # Synapse publishes only its own images. Astrocyte images
  # (astrocyte-gateway-py, astrocyte-postgres) ship from the
  # AstrocyteAI/astrocyte repo's release workflow and are pulled at
  # runtime by Synapse's docker-compose.yml.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: synapse-backend
            context: apps/backend
            image: ghcr.io/astrocyteai/synapse/synapse-backend
          - name: synapse-web
            context: apps/web
            image: ghcr.io/astrocyteai/synapse/synapse-web

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # Flutter desktop builds — macOS, Windows, Linux (parallel matrix)
  # ---------------------------------------------------------------------------
  flutter:
    name: Flutter (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            job-name: release-macos-dmg
            artifact-glob: "*.dmg"
            asset-name: synapse-macos

          - os: windows-latest
            target: windows
            job-name: release-windows-exe
            artifact-glob: "*.exe"
            asset-name: synapse-windows

          - os: ubuntu-latest
            target: linux
            job-name: release-linux-appimage
            artifact-glob: "*.AppImage"
            asset-name: synapse-linux

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.6"
          channel: stable
          cache: true

      # ---------------------------------------------------------------------
      # Per-platform tooling. Each platform's flutter_distributor target
      # depends on a native packaging tool that doesn't ship with the
      # GitHub runner image:
      #   • Linux  — appimagetool (via apt) + libfuse2 + desktop-file-utils
      #   • macOS  — appdmg (via npm)
      #   • Windows — NSIS (via Chocolatey)
      # ---------------------------------------------------------------------
      - name: Platform setup (Linux)
        if: matrix.os == 'ubuntu-latest'
        # apt provides:
        #   • libwebkit2gtk-4.1-dev — desktop_webview_window's CMake configure
        #     (transitive dep via casdoor_flutter_sdk)
        #   • libfuse2              — runtime requirement for any AppImage
        #     (including appimagetool itself, which is distributed as
        #      an AppImage)
        #   • desktop-file-utils    — provides validate-desktop-file used by
        #                             appimagetool to lint the .desktop entry
        #
        # appimagetool itself is NOT in apt — fetched directly from the
        # AppImageKit GitHub releases. Pinning to v13 (latest stable as of
        # 2026-04) for reproducibility; bump the URL when AppImageKit
        # cuts a newer release we want.
        run: |
          set -euo pipefail
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libwebkit2gtk-4.1-dev \
            libfuse2 desktop-file-utils
          sudo wget -qO /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
          appimagetool --version

      - name: Platform setup (macOS)
        if: matrix.os == 'macos-latest'
        run: npm install -g appdmg

      - name: Platform setup (Windows)
        if: matrix.os == 'windows-latest'
        # flutter_app_packager's EXE maker uses Inno Setup (NOT NSIS, despite
        # what some flutter_distributor docs suggest). The compiler is iscc.exe.
        run: choco install -y innosetup

      # ---------------------------------------------------------------------
      # Common build pipeline — all three platforms via flutter_distributor.
      # ---------------------------------------------------------------------
      - name: Install dependencies
        working-directory: apps/synapse_app
        run: flutter pub get

      - name: Enable desktop target
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build release artifact
        working-directory: apps/synapse_app
        run: flutter_distributor release --name=production --jobs=${{ matrix.job-name }}

      # ---------------------------------------------------------------------
      # Stage the produced artifact for the GitHub Release upload step.
      # flutter_distributor drops outputs under dist/<version>/<job>/ — we
      # find by glob and rename to a stable shape: synapse-<os>-<tag>.<ext>.
      # ---------------------------------------------------------------------
      - name: Stage artifact (Unix shells)
        if: matrix.os != 'windows-latest'
        working-directory: apps/synapse_app
        run: |
          set -euo pipefail
          TAG=${{ github.ref_name }}
          ARTIFACT=$(find dist -name '${{ matrix.artifact-glob }}' -type f | head -1)
          if [ -z "${ARTIFACT}" ]; then
            echo "::error::No artifact matching ${{ matrix.artifact-glob }} produced"
            ls -laR dist/ || true
            exit 1
          fi
          EXT="${ARTIFACT##*.}"
          NAME="${{ matrix.asset-name }}-${TAG}.${EXT}"
          mv "${ARTIFACT}" "${NAME}"
          # AppImage needs the executable bit; the others don't care.
          chmod +x "${NAME}" || true
          echo "ASSET=apps/synapse_app/${NAME}" >> $GITHUB_ENV

      - name: Stage artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: apps/synapse_app
        run: |
          $tag = "${{ github.ref_name }}"
          $artifact = Get-ChildItem -Path dist -Recurse -Filter '${{ matrix.artifact-glob }}' | Select-Object -First 1
          if (-not $artifact) {
            Write-Error "No artifact matching ${{ matrix.artifact-glob }} produced"
            Get-ChildItem -Path dist -Recurse | Format-List
            exit 1
          }
          $ext = $artifact.Extension.TrimStart('.')
          $name = "${{ matrix.asset-name }}-${tag}.${ext}"
          Move-Item -Path $artifact.FullName -Destination $name
          echo "ASSET=apps/synapse_app/${name}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
