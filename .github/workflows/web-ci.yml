name: Web CI

# Runs the Svelte web app's type-check, unit tests, and production build on
# every push / PR that touches `apps/web/` or this workflow.
#
# The unit tests use Vitest. They were added alongside Mode 4 (chat-with-
# tools) — the SSE-parser logic in src/lib/api/client.ts is the first
# JS-side surface that warranted real coverage.

on:
  push:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

defaults:
  run:
    working-directory: apps/web

jobs:
  test:
    name: Type-check, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          # lockfileVersion 9 ships with pnpm 9.x and 10.x.
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `svelte-kit sync` is run by `prepare` already, but kept explicit so
      # the type-check failure mode is unambiguous if sync itself errors.
      - name: Sync SvelteKit
        run: pnpm exec svelte-kit sync

      - name: Type-check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Production build
        # Catches anything that type-check missed — bad imports in route
        # files, broken Vite plugins, etc.
        run: pnpm build
